name: Deploy via Private API

on:
  pull_request_target:
    types: [labeled]

concurrency:
  group: nsu-vpn-import
  cancel-in-progress: false

jobs:
  deploy-via-api:
    if: contains(github.event.pull_request.labels.*.name, 'deploy')
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v3
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Check endpoint reachability without VPN
        continue-on-error: true
        env:
          LMS_API_URL: ${{ secrets.LMS_API_URL }}
        run: |
          if curl -kIsS --connect-timeout 10 --max-time 20 "$LMS_API_URL" >/dev/null; then
            echo "Private endpoint is already reachable without VPN."
          else
            echo "Private endpoint is not reachable without VPN yet."
          fi

      - name: Install SSTP VPN dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ppp sstp-client iproute2

      - name: Configure and start NSU VPN
        env:
          NSU_VPN_USERNAME: ${{ secrets.NSU_VPN_USERNAME }}
          NSU_VPN_PASSWORD: ${{ secrets.NSU_VPN_PASSWORD }}
        run: |
          sudo install -d -m 700 /etc/ppp/peers
          if [ -f /etc/ppp/chap-secrets ]; then
            sudo cp /etc/ppp/chap-secrets /etc/ppp/chap-secrets.github-actions.bak
          fi
          printf '"%s" * "%s" *\n' "$NSU_VPN_USERNAME" "$NSU_VPN_PASSWORD" | sudo tee /etc/ppp/chap-secrets >/dev/null
          sudo chmod 600 /etc/ppp/chap-secrets

          PLUGIN_PATH="$(dpkg -L sstp-client | grep 'sstp-pppd-plugin.so$' | head -n 1)"
          if [ -z "$PLUGIN_PATH" ]; then
            echo "Could not locate sstp-pppd-plugin.so"
            exit 1
          fi

          sudo tee /etc/ppp/peers/nsu-vpn >/dev/null <<EOF
          pty "/usr/sbin/sstpc --ipparam nsu-vpn --cert-warn --save-server-route --nolaunchpppd vpn.nsu.ru"
          user "${NSU_VPN_USERNAME}"
          name "${NSU_VPN_USERNAME}"
          remotename vpn.nsu.ru
          linkname nsu-vpn
          ipparam nsu-vpn
          ifname nsuvpn0
          plugin ${PLUGIN_PATH}
          sstp-sock /var/run/sstpc/sstpc-nsu-vpn
          noauth
          noipdefault
          defaultroute
          usepeerdns
          refuse-eap
          refuse-pap
          refuse-chap
          refuse-mschap
          nomppe
          noccp
          nobsdcomp
          nodeflate
          maxfail 1
          holdoff 5
          logfd 2
          EOF
          sudo chmod 600 /etc/ppp/peers/nsu-vpn

          sudo poff nsu-vpn >/dev/null 2>&1 || true
          sudo pon nsu-vpn

          for attempt in {1..12}; do
            if ip link show nsuvpn0 >/dev/null 2>&1; then
              echo "VPN interface nsuvpn0 is up."
              exit 0
            fi

            echo "Waiting for VPN interface (attempt ${attempt}/12)..."
            sleep 5
          done

          echo "VPN interface did not appear in time."
          ip route
          sudo pgrep -af 'pppd|sstpc' || true
          exit 1

      - name: Verify private endpoint over VPN
        env:
          LMS_API_URL: ${{ secrets.LMS_API_URL }}
        run: |
          TARGET_HOST="$(python - <<'PY'
          import os
          from urllib.parse import urlparse

          print(urlparse(os.environ["LMS_API_URL"]).hostname or "")
          PY
          )"

          echo "VPN routes:"
          ip route
          echo "VPN interface:"
          ip addr show nsuvpn0
          echo "Host resolution:"
          getent hosts "$TARGET_HOST" || true

          TARGET_IPS="$(getent ahostsv4 "$TARGET_HOST" | awk '{print $1}' | sort -u)"
          if [ -z "$TARGET_IPS" ]; then
            echo "Could not resolve any IPv4 address for $TARGET_HOST."
            exit 1
          fi

          for target_ip in $TARGET_IPS; do
            echo "Routing $target_ip/32 through nsuvpn0"
            sudo ip route replace "$target_ip"/32 dev nsuvpn0
          done

          echo "Routes after target host pinning:"
          ip route

          HTTP_CODE="$(curl -k -o /dev/null -sS -w '%{http_code}' --connect-timeout 15 --max-time 30 "$LMS_API_URL" || true)"
          if [ "$HTTP_CODE" = "000" ]; then
            echo "Private endpoint is still unreachable after VPN."
            exit 1
          fi

          echo "Private endpoint responded with HTTP $HTTP_CODE."

      - name: Install Python dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install requests pydantic pyyaml

      - name: Upload Course
        env:
          LMS_API_URL: ${{ secrets.LMS_API_URL }}
          LMS_API_TOKEN: ${{ secrets.LMS_API_TOKEN }}
          PYTHONPATH: .
        run: |
          export LMS_API_URL="$(printf '%s' "$LMS_API_URL" | tr -d '\r\n')"
          export LMS_API_TOKEN="$(printf '%s' "$LMS_API_TOKEN" | tr -d '\r\n')"
          echo "🚀 Sending to Private API: $LMS_API_URL"
          python -m src.runner Example

      - name: Cleanup VPN artifacts
        if: ${{ always() }}
        run: |
          sudo poff nsu-vpn >/dev/null 2>&1 || true
          sudo pkill -f '/usr/sbin/sstpc .* vpn.nsu.ru' || true
          sudo pkill -f 'pppd call nsu-vpn' || true
          sudo rm -f /etc/ppp/peers/nsu-vpn
          if [ -f /etc/ppp/chap-secrets.github-actions.bak ]; then
            sudo mv /etc/ppp/chap-secrets.github-actions.bak /etc/ppp/chap-secrets
          else
            sudo rm -f /etc/ppp/chap-secrets
          fi

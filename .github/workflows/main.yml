name: Deploy via Public API

on:
  pull_request_target:
    types: [labeled]

jobs:
  deploy-via-api:
    if: contains(github.event.pull_request.labels.*.name, 'deploy')
    runs-on: ubuntu-latest

    steps:
      # 1. Скачиваем содержимое репозитория (оно попадает в текущую папку)
      - uses: actions/checkout@v3
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Убедитесь, что устанавливаются все нужные библиотеки для клиента
          pip install requests pydantic pyyaml

      # 2. Валидация курса перед загрузкой
      - name: Validate Course
        env:
          PYTHONPATH: .
        run: |
          echo "🔍 Validating course structure..."
          python -m src.validate Example

      # 3. Запускаем runner.py (только если валидация прошла)
      - name: Upload Course
        if: success()
        env:
          LMS_API_URL: ${{ secrets.LMS_API_URL }}
          LMS_API_TOKEN: ${{ secrets.LMS_API_TOKEN }}
          PYTHONPATH: .
        run: |
          echo "🚀 Sending to Public API: $LMS_API_URL"
          python -m src.runner Example
